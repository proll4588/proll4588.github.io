<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Аппроксимация функций</title>

        <link rel="stylesheet" href="css/style.css" />

        <script src="js/sideBarAnim.js"></script>
        <script src="js/events.js"></script>
        <script src="../ney scripts/ClassNey.js"></script>
        <script src="../canvasDrawScripts/script.js"></script>
        <script src="https://kit.fontawesome.com/4238e88fa9.js" crossorigin="anonymous"></script>
    </head>

    <body onload="setup();">
        <div id="mySidenav" class="sidenav">
            <button class="closebtn" onclick="closeNav();"><i class="fas fa-times"></i></button>
            <div class="settings">
                <div class="settingsFun set">
                    <div class="d">
                        <div class="d1" style="display: flex; flex-direction: column">
                            <div>
                                <h3>Функции</h3>
                            </div>
                            <div>
                                <div
                                    class="buttons_claster"
                                    style="display: flex; flex-direction: column"
                                >
                                    <button onclick="setFun('x');" class="bt1">x</button>
                                    <button onclick="setFun('-x*x*0.005')" class="bt2">x^2</button>
                                    <button onclick="setFun('10000/x')" class="bt3">1/x</button>
                                    <button
                                        onclick="setFun('Math.sin(x * 0.01) * 100')"
                                        class="bt4"
                                    >
                                        sin(x)
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="settingsNey set">
                    <div>
                        <h3 style="color: white">Настройки</h3>
                    </div>
                    <div class="d1">
                        <h4>Шаг</h4>
                        <input type="text" class="textSettings" id="step" value="20" />
                    </div>

                    <div class="d1">
                        <h4>Конфиг сети</h4>
                        <input type="text" class="configSettings" id="config" value="[3, 3]" />
                        <button onclick="resetNey();" style="width: 45px">Set</button>
                    </div>

                    <div class="d1">
                        <button onclick="setFun();" style="width: 70px">Задать</button>
                        <button onclick="net.reset();">Сбросить сеть</button>
                    </div>
                </div>
                <div class="drawNey set">
                    <canvas id="ney" width="400" height="300"></canvas>
                </div>
            </div>
        </div>

        <div id="main">
            <div class="fl">
                <div class="fll">
                    <button onclick="openNav();" class="openButton" id="openButton">
                        <i class="fa fa-bars"></i>
                    </button>
                </div>
                <canvas id="field" width="600" height="600"></canvas>
            </div>
        </div>

        <script src="js/canvasDraw.js"></script>
        <script src="js/drawNey.js"></script>
    </body>
</html>
