<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Aprocs fun</title>
        <script src="../ney scripts/ClassNey.js"></script>
        <script src="../canvasDrawScripts/script.js"></script>
        <style>
            * {
                padding: 0;
                margin: 0;
            }

            body {
                background-color: #313131;
            }

            .d1,
            .d2,
            .d3,
            .d4 {
                display: flex;
                color: white;
            }

            .settings {
                height: 300px;
                width: 400px;
            }

            /* #field,
            #ney,
            .settings {
                border: 4px double white;
            } */

            h5 {
                margin: 0;
                padding: 0;
            }

            .fl {
                display: flex;
            }
        </style>
    </head>
    <body onload="setup();">
        <div class="fl">
            <canvas id="field" width="600" height="600"></canvas>
            <div class="fladd">
                <div class="settings">
                    <div class="d">
                        <div class="d1">
                            <input type="radio" name="fun" id="x" />
                            <h5>x</h5>
                        </div>

                        <div class="d2">
                            <input type="radio" name="fun" id="x^2" />
                            <h5>x^2</h5>
                        </div>

                        <div class="d3">
                            <input type="radio" name="fun" id="1/x" />
                            <h5>1/x</h5>
                        </div>

                        <div class="d4">
                            <input type="radio" name="fun" id="sin(x)" />
                            <h5>sin(x)</h5>
                        </div>

                        <div class="d5">
                            <button onclick="setFun();">Set fun</button>
                            <button onclick="net.reset();">Reset Net</button>
                        </div>
                    </div>
                </div>
                <canvas id="ney" width="400" height="300"></canvas>
            </div>
        </div>

        <script src="canvasDraw.js"></script>
        <script src="drawNey.js"></script>
    </body>
</html>
