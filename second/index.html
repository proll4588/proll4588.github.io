<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Aprocsimation fun</title>

        <link rel="stylesheet" href="css/style.css" />

        <script src="js/sideBarAnim.js"></script>
        <script src="js/events.js"></script>
        <script src="../ney scripts/ClassNey.js"></script>
        <script src="../canvasDrawScripts/script.js"></script>
        <script src="https://kit.fontawesome.com/4238e88fa9.js" crossorigin="anonymous"></script>
    </head>

    <body onload="setup();">
        <div id="mySidenav" class="sidenav">
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
            <div class="void"></div>
            <div class="settings">
                <div class="d">
                    <div class="d1">
                        <input type="radio" name="fun" id="x" class="checkSet" />
                        <input type="text" id="parXLine" class="textSettings" value="1" />
                        <h4>x +</h4>
                        <input type="text" id="parXLine1" class="textSettings" value="0" />
                    </div>

                    <div class="d1">
                        <input type="radio" name="fun" id="x^2" class="checkSet" />
                        <input type="text" id="parX1" class="textSettings" value="1" />
                        <h4>x^2 +</h4>
                        <input type="text" id="parX2" class="textSettings" value="0" />
                        <h4>x +</h4>
                        <input type="text" id="parX3" class="textSettings" value="0" />
                    </div>

                    <div class="d1">
                        <input type="radio" name="fun" id="1/x" class="checkSet" />
                        <h4>1/x</h4>
                    </div>

                    <div class="d1">
                        <input type="radio" name="fun" id="sin(x)" class="checkSet" />
                        <h4>sin(x)</h4>
                    </div>

                    <div class="d1">
                        <input type="radio" name="fun" id="self" class="checkSet" />
                        <h4>Self</h4>
                    </div>

                    <div class="d1">
                        <h4>Step</h4>
                        <input type="text" class="textSettings" id="step" value="20" />
                    </div>

                    <div class="d1">
                        <button onclick="setFun();">Set fun</button>
                        <button onclick="net.reset();">Reset Net</button>
                        <button onclick="resetPoints();">Reset Points</button>
                    </div>
                </div>
            </div>
            <canvas id="ney" width="400" height="300"></canvas>
        </div>

        <div id="main">
            <div class="fl">
                <div class="fll">
                    <!-- <span onclick="openNav();" class="openButton">open</span> -->
                    <button onclick="openNav();" class="openButton" id="openButton">
                        <i class="fa fa-bars"></i>
                    </button>
                </div>
                <canvas id="field" width="600" height="600"></canvas>
            </div>
        </div>

        <script src="canvasDraw.js"></script>
        <script src="drawNey.js"></script>
    </body>
</html>
