<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ney</title>
        <script src="../ney scripts/ClassNey.js"></script>
        <style>
            * {
                padding: 0;
                margin: 0;
            }

            .d1,
            .d2,
            .d3 {
                display: flex;
            }

            h5 {
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body onload="setup();">
        <script>
            document.addEventListener("mousedown", (event) => setPoint());
            document.addEventListener("mousemove", (event) => {
                mouseX = event.pageX;
                mouseY = event.pageY;
            });
        </script>

        <div class="fl">
            <canvas id="field" width="200" height="200"></canvas>
        </div>
        <script src="canvasDraw.js"></script>

        <div class="d">
            <div class="d1">
                <input type="radio" name="color" id="red" />
                <h5>red</h5>
            </div>

            <div class="d2">
                <input type="radio" name="color" id="green" />
                <h5>green</h5>
            </div>

            <div class="d3">
                <input type="radio" name="color" id="Blue" />
                <h5>blue</h5>
            </div>

            <div class="d4">
                <button onclick="net.reset();">Reset Net</button>
            </div>
        </div>
    </body>
</html>
